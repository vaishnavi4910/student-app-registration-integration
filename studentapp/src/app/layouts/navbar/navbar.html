<div class="flex items-center justify-between bg-white px-6 py-4 shadow-sm border-b">

    <!-- Left -->
    <div>
        <h2 class="text-2xl font-bold text-[#232527]">
            Dashboard
        </h2>
    </div>

    <!-- Center -->
    <div class="w-96">
        <input
            pInputText
            type="text"
            [(ngModel)]="searchText"
            placeholder="Search..."
            class="w-full">
    </div>

    <!-- Right -->
    <div class="flex items-center gap-4">

        <i class="pi pi-bell text-xl cursor-pointer"></i>

        <p-avatar
            label="V"
            shape="circle">
        </p-avatar>

    </div>

</div>
