<header class="admin-navbar">
  <p-button icon="pi pi-bars" [text]="true" [rounded]="true" ariaLabel="Toggle sidebar" (onClick)="sidebarToggle.emit()" />
  <span class="search-box"><i class="pi pi-search"></i><input pInputText [(ngModel)]="searchText" placeholder="Search anything..." aria-label="Admin search" /></span>
  <div class="nav-actions">
    <p-button icon="pi pi-bell" [text]="true" [rounded]="true" ariaLabel="Notifications" />
    <button class="profile-button" type="button" (click)="profileMenu.toggle($event)">
      <p-avatar label="AD" shape="circle" /><span class="profile-copy"><strong>Admin User</strong><small>Administrator</small></span><i class="pi pi-angle-down"></i>
    </button>
    <p-menu #profileMenu [model]="profileItems" [popup]="true" />
  </div>
</header>
